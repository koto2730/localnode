            const loadMentionsCache = () => {
                try {
                    const raw = sessionStorage.getItem(MENTION_CACHE_KEY);
                    if (!raw) return null;
                    const o = JSON.parse(raw);
                    if (!o || !Array.isArray(o.items) || typeof o.ts !== 'number') return null;
                    if (Date.now() - o.ts > MENTION_CACHE_TTL_MS) return null;
                    return o.items;
                } catch (_) { return null; }
            };
            const saveMentionsCache = (items) => {
                try { sessionStorage.setItem(MENTION_CACHE_KEY, JSON.stringify({ ts: Date.now(), items })); } catch (_) {}
            };

            const fetchMentions = async () => {
                const cached = loadMentionsCache();
                if (cached) return cached;
                const res = await safeFetch('/api/mentions');
                if (!res.ok) throw new Error('/api/mentions HTTP ' + res.status);
                const data = await res.json();
                const items = Array.isArray(data?.items) ? data.items : [];
                saveMentionsCache(items);
                return items;
            };

            const insertAtCursor = (textarea, insertText) => {
                const start = textarea.selectionStart ?? textarea.value.length;
                const end = textarea.selectionEnd ?? textarea.value.length;
                const before = textarea.value.slice(0, start);
                const after = textarea.value.slice(end);
                // Add space after the mention so the user can keep typing args
                const needSpace = !after.startsWith(' ') && !after.startsWith('\n');
                const tail = needSpace ? ' ' : '';
                textarea.value = before + insertText + tail + after;
                const caret = start + insertText.length + tail.length;
                textarea.setSelectionRange(caret, caret);
                textarea.focus();
            };

            const closeMentionPicker = () => {
                mentionPickerPopover.hidden = true;
                mentionPickerPopover.innerHTML = '';
            };

            const openMentionPicker = async () => {
                if (!mentionPickerPopover.hidden) { closeMentionPicker(); return; }
                // Position above the input row
                mentionPickerPopover.innerHTML = '<div class="mention-picker-empty">読込中…</div>';
                mentionPickerPopover.hidden = false;
                positionMentionPicker();
                let items = [];
                try {
                    items = await fetchMentions();
                } catch (e) {
                    mentionPickerPopover.innerHTML = `<div class="mention-picker-empty">取得失敗: ${escapeHtml(e.message)}</div>`;
                    return;
                }
                if (items.length === 0) {
                    mentionPickerPopover.innerHTML = '<div class="mention-picker-empty">利用可能なメンションはありません</div>';
                    return;
                }
                mentionPickerPopover.innerHTML = items.map((it, idx) => {
                    const label = escapeHtml(it.label ?? it.insert ?? '');
                    const desc = it.description ? `<div class="mp-desc">${escapeHtml(it.description)}</div>` : '';
                    return `<div class="mention-picker-item" role="option" data-idx="${idx}"><span class="mp-label">${label}</span>${desc}</div>`;
                }).join('');
                positionMentionPicker();
                mentionPickerPopover.querySelectorAll('.mention-picker-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.dataset.idx, 10);
                        const it = items[idx];
                        if (it) insertAtCursor(clipboardInput, it.insert ?? it.label ?? '');
                        closeMentionPicker();
                    });
                });
            };

            const positionMentionPicker = () => {
                // Place the popover just above the button, right-aligned to it
                const btn = mentionPickerBtn;
                const inputRow = btn.parentElement;
                if (!inputRow) return;
                const pop = mentionPickerPopover;
                // Use the input row as relative container (already position:relative)
                pop.style.left = '';
                pop.style.right = (inputRow.clientWidth - btn.offsetLeft - btn.offsetWidth) + 'px';
                pop.style.bottom = (inputRow.clientHeight - btn.offsetTop + 4) + 'px';
                pop.style.top = '';
            };

            mentionPickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openMentionPicker();
            });
            document.addEventListener('click', (e) => {
                if (mentionPickerPopover.hidden) return;
                if (mentionPickerPopover.contains(e.target) || e.target === mentionPickerBtn) return;
                closeMentionPicker();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !mentionPickerPopover.hidden) closeMentionPicker();
            });
            clipboardInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendClipboardText();
                }
            });

            window.copyClipboardItem = async (id) => {
                const item = document.querySelector(`[data-id="${id}"]`);
                if (!item) return;

                // 原文 (@file: マーカーを含む) を currentClipboardItems から取得
                const original = currentClipboardItems.find(i => i.id === id);
                const text = original ? original.text : item.querySelector('.clipboard-item-text').textContent;

                try {
                    await navigator.clipboard.writeText(text);
                    const btn = item.querySelector('.btn-copy');
                    const originalText = btn.textContent;
                    btn.textContent = 'コピー済み';
                    btn.style.backgroundColor = '#4caf50';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.backgroundColor = '';
                    }, 1000);
                } catch (err) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('コピーしました');
                }
            };

            window.deleteClipboardItem = async (id) => {
                try {
                    const response = await safeFetch(`/api/clipboard/${id}`, { method: 'DELETE' });
                    if (!response.ok) throw new Error('削除に失敗しました。');
                    fetchClipboard();
                } catch (error) {
                    alert(error.message);
                }
            };

            downloadClipboardBtn.addEventListener('click', () => {
                // #229: TXT export respects current filter (search + tags)
                const source = applyClipboardFilter(currentClipboardItems);
                const text = source.map(item => {
                    const prefix = item.tag ? `[${item.tag}] ` : '';
                    return `${prefix}${item.text}`;
                }).join('\n---\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'clipboard.txt';
                a.click();
                URL.revokeObjectURL(url);
            });

            clearClipboardBtn.addEventListener('click', async () => {
                if (!confirm('クリップボードのすべてのアイテムを削除しますか？')) return;

                try {
                    const response = await safeFetch('/api/clipboard', { method: 'DELETE' });
                    if (!response.ok) throw new Error('削除に失敗しました。');
                    fetchClipboard();
                } catch (error) {
                    alert(error.message);
                }
            });

            // === ソート・ビューワーモード ===

            const sortItems = (items) => {
                const dirs = items.filter(i => i.type === 'directory');
                const files = items.filter(i => i.type !== 'directory');
                const cmp = (a, b) => {
                    let r = 0;
                    if (sortBy === 'name') r = a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
                    else if (sortBy === 'size') r = (a.size || 0) - (b.size || 0);
                    return sortOrder === 'asc' ? r : -r;
                };
                return [...dirs.sort(cmp), ...files.sort(cmp)];
            };

            const renderView = () => {
                const sorted = sortItems(allItems);
                if (isViewerMode) renderGridView(sorted);
                else renderTableView(sorted);
            };

            const renderTableView = (items) => {
                const fileList = document.getElementById('file-list');
                const isDownloadOnly = serverInfo.operationMode === 'downloadOnly';

                if (items.length === 0) {
                    fileList.innerHTML = '<table><tbody><tr><td colspan="3" style="text-align:center;">ファイルはありません。</td></tr></tbody></table>';
                    return;
                }

                fileList.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th class="preview-col"></th>
                                <th class="fileinfo-col">ファイル名</th>
                                <th class="actions">操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>`;
                const tbody = fileList.querySelector('tbody');

                items.forEach(item => {
                    const row = document.createElement('tr');
                    if (item.type === 'directory') {
                        row.classList.add('folder-row');
                        const tdIcon = document.createElement('td');
                        tdIcon.className = 'preview-col';
                        tdIcon.textContent = '📁';
                        const tdName = document.createElement('td');
                        tdName.className = 'fileinfo-col';
                        tdName.title = item.name;
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'fileinfo-name';
                        nameDiv.textContent = item.name;
                        tdName.appendChild(nameDiv);
                        const tdActions = document.createElement('td');
                        tdActions.className = 'actions';
                        row.append(tdIcon, tdName, tdActions);
                        row.addEventListener('click', () => {
                            navigateTo(currentPath ? `${currentPath}/${item.name}` : item.name);
                        });
                    } else {
                        const sizeMB = (item.size / (1024 * 1024)).toFixed(2);
                        const tdIcon = document.createElement('td');
                        tdIcon.className = 'preview-col';
                        if (isImageFile(item.name)) {
                            const img = document.createElement('img');
                            img.src = `/api/thumbnail/${item.id}`;
                            img.alt = item.name;
                            img.loading = 'lazy';
                            tdIcon.appendChild(img);
                        } else {
                            tdIcon.textContent = getFilePreview(item);
                        }
                        const tdName = document.createElement('td');
                        tdName.className = 'fileinfo-col';
                        tdName.title = item.name;
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'fileinfo-name';
                        nameDiv.textContent = item.name;
                        const sizeDiv = document.createElement('div');
                        sizeDiv.className = 'fileinfo-size';
                        sizeDiv.textContent = `${sizeMB} MB`;
                        tdName.append(nameDiv, sizeDiv);
                        const tdActions = document.createElement('td');
                        tdActions.className = 'actions';
                        const dlBtn = document.createElement('button');
                        dlBtn.className = 'btn-download';
                        dlBtn.textContent = 'DL';
                        dlBtn.addEventListener('click', () => downloadFile(item.id, item.name));
                        tdActions.appendChild(dlBtn);
                        // #216: 拡張子ホワイトリスト外でも「テキストとして開く」を試せる
                        if (!isTextFile(item.name) && !isVideoFile(item.name) && !isImageFile(item.name)) {
                            const txtBtn = document.createElement('button');
                            txtBtn.className = 'btn-view-text';
                            txtBtn.textContent = 'TXT';
                            txtBtn.title = 'テキストとして開く';
                            txtBtn.addEventListener('click', () =>
                                openTextPreview(item.id, item.name));
                            tdActions.appendChild(txtBtn);
                        }
                        if (!isDownloadOnly) {
                            const delBtn = document.createElement('button');
                            delBtn.className = 'btn-delete';
                            delBtn.textContent = '削除';
                            delBtn.addEventListener('click', () => deleteFile(item.id, item.name));
                            tdActions.appendChild(delBtn);
                        }
                        row.append(tdIcon, tdName, tdActions);
                        // #193/#189: テキスト→プレビュー、動画→プレイヤー
                        if (isTextFile(item.name)) {
                            row.style.cursor = 'pointer';
                            row.addEventListener('click', (e) => {
                                if (e.target.tagName === 'BUTTON') return;
                                openTextPreview(item.id, item.name);
                            });
                        } else if (isVideoFile(item.name)) {
                            row.style.cursor = 'pointer';
                            row.addEventListener('click', (e) => {
                                if (e.target.tagName === 'BUTTON') return;
                                openVideoPlayer(item.id, item.name);
                            });
                        }
                    }
                    tbody.appendChild(row);
                });
            };

            const renderGridView = (items) => {
                lightboxImageList = items.filter(i => i.type !== 'directory' && isImageFile(i.name));
                const isDownloadOnly = serverInfo.operationMode === 'downloadOnly';
                const fileList = document.getElementById('file-list');

                if (items.length === 0) {
                    fileList.innerHTML = '<p style="text-align:center; color:#666; padding:1rem;">ファイルはありません。</p>';
                    return;
                }

                fileList.textContent = '';

                if (compareImages.length > 0) {
                    const hdr = document.createElement('div');
                    Object.assign(hdr.style, { textAlign: 'right', marginBottom: '0.5rem', fontSize: '0.85rem', color: '#666' });
                    hdr.appendChild(document.createTextNode(`${compareImages.length}/2 選択中`));
                    if (compareImages.length === 2) {
                        const openBtn = document.createElement('button');
                        openBtn.id = 'compareOpenBtn';
                        Object.assign(openBtn.style, { marginLeft: '0.5rem', padding: '0.2rem 0.6rem', background: '#1a73e8', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' });
                        openBtn.textContent = '比較する';
                        openBtn.addEventListener('click', openComparison);
                        hdr.appendChild(openBtn);
                    }
                    const clearBtn = document.createElement('button');
                    clearBtn.id = 'compareClearBtn';
                    Object.assign(clearBtn.style, { marginLeft: '0.5rem', padding: '0.2rem 0.6rem', background: '#999', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' });
                    clearBtn.textContent = 'クリア';
                    clearBtn.addEventListener('click', () => { compareImages = []; renderView(); });
                    hdr.appendChild(clearBtn);
                    fileList.appendChild(hdr);
                }

                const grid = document.createElement('div');
                grid.className = 'viewer-grid';

                items.forEach(item => {
                    const viewerItem = document.createElement('div');
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'viewer-name';
                    nameDiv.title = item.name;
                    nameDiv.textContent = item.name;

                    if (item.type === 'directory') {
                        viewerItem.className = 'viewer-item';
                        const iconDiv = document.createElement('div');
                        iconDiv.className = 'viewer-icon';
                        iconDiv.textContent = '📁';
                        viewerItem.append(iconDiv, nameDiv);
                        const target = currentPath ? `${currentPath}/${item.name}` : item.name;
                        viewerItem.addEventListener('click', () => navigateTo(target));
                    } else if (isImageFile(item.name)) {
                        const imgIdx = lightboxImageList.findIndex(i => i.id === item.id);
                        const sel = compareImages.some(c => c.id === item.id);
                        viewerItem.className = `viewer-item${sel ? ' selected' : ''}`;
                        const img = document.createElement('img');
                        img.src = `/api/thumbnail/${item.id}`;
                        img.alt = item.name;
                        img.loading = 'lazy';
                        img.style.cursor = 'pointer';
                        img.addEventListener('click', () => openLightbox(imgIdx));
                        const cmpBtn = document.createElement('button');
                        cmpBtn.className = `viewer-compare-btn${sel ? ' selected' : ''}`;
                        cmpBtn.textContent = sel ? '✓ 選択済' : '比較選択';
                        cmpBtn.addEventListener('click', () => toggleCompare(item.id, item.name));
                        viewerItem.append(img, nameDiv, cmpBtn);
                    } else if (isVideoFile(item.name)) {
                        // #189: ファーストフレームをサムネ表示、クリックでプレイヤー
                        viewerItem.className = 'viewer-item';
                        const video = document.createElement('video');
                        video.src = `/api/download/${item.id}`;
                        video.preload = 'metadata';
                        video.muted = true;
                        video.playsInline = true;
                        video.addEventListener('loadedmetadata', () => {
                            try { video.currentTime = 0.1; } catch (_) {}
                        });
                        video.addEventListener('click', () => openVideoPlayer(item.id, item.name));
                        viewerItem.append(video, nameDiv);
                    } else {
                        viewerItem.className = 'viewer-item';
                        const iconDiv = document.createElement('div');
                        iconDiv.className = 'viewer-icon';
                        iconDiv.textContent = getFilePreview(item);
                        viewerItem.append(iconDiv, nameDiv);
                        if (isTextFile(item.name)) {
                            viewerItem.addEventListener('click', () => openTextPreview(item.id, item.name));
                        } else {
                            viewerItem.addEventListener('click', () => downloadFile(item.id, item.name));
                        }
                    }
                    grid.appendChild(viewerItem);
                });
                fileList.appendChild(grid);
            };

            window.toggleCompare = (id, name) => {
                const idx = compareImages.findIndex(c => c.id === id);
                if (idx >= 0) {
                    compareImages.splice(idx, 1);
                } else {
                    if (compareImages.length >= 2) { alert('比較できるのは2枚までです。'); return; }
                    compareImages.push({ id, name });
                }
                renderView();
            };

            const openComparison = () => {
                if (compareImages.length < 2) return;
                document.getElementById('comp-img-0').src = `/api/download/${compareImages[0].id}`;
                document.getElementById('comp-meta-0').textContent = compareImages[0].name;
                document.getElementById('comp-img-1').src = `/api/download/${compareImages[1].id}`;
                document.getElementById('comp-meta-1').textContent = compareImages[1].name;
                document.getElementById('comparison-view').classList.add('open');
            };

            document.getElementById('comparison-close').addEventListener('click', () => {
                document.getElementById('comparison-view').classList.remove('open');
            });

            // === ライトボックス ===
            const lightboxEl = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxMeta = document.getElementById('lightbox-meta');

            window.openLightbox = (idx) => {
                if (lightboxImageList.length === 0) return;
                lightboxIndex = idx;
                lightboxScale = 1;
                lightboxImg.style.transform = 'scale(1)';
                updateLightbox();
                lightboxEl.classList.add('open');
                document.body.style.overflow = 'hidden';
            };

            const updateLightbox = () => {
                const item = lightboxImageList[lightboxIndex];
                if (!item) return;
                lightboxImg.src = `/api/download/${item.id}`;
                lightboxImg.alt = item.name;
                const sizeMB = item.size ? ` • ${(item.size / (1024 * 1024)).toFixed(2)} MB` : '';
                lightboxMeta.textContent = `${item.name}${sizeMB} (${lightboxIndex + 1} / ${lightboxImageList.length})`;
            };

            const closeLightbox = () => {
                lightboxEl.classList.remove('open');
                document.body.style.overflow = '';
                lightboxImg.src = '';
            };

            document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
            lightboxEl.addEventListener('click', (e) => { if (e.target === lightboxEl) closeLightbox(); });
            document.getElementById('lightbox-save').addEventListener('click', () => {
                const item = lightboxImageList[lightboxIndex];
                if (item) downloadFile(item.id, item.name);
            });

            // #189: 動画プレイヤー
            let videoPlayerState = { id: null, name: null };
            const videoPlayerOverlay = document.getElementById('video-player-overlay');
            const videoPlayerEl = document.getElementById('video-player');
            const videoPlayerMeta = document.getElementById('video-player-meta');

            window.openVideoPlayer = (id, name) => {
                videoPlayerState = { id, name };
                videoPlayerEl.src = `/api/download/${id}`;
                videoPlayerMeta.textContent = name;
                videoPlayerOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
                videoPlayerEl.play().catch(() => {});
            };

            const closeVideoPlayer = () => {
                videoPlayerEl.pause();
                videoPlayerEl.removeAttribute('src');
                videoPlayerEl.load();
                videoPlayerOverlay.classList.remove('open');
                document.body.style.overflow = '';
            };

            document.getElementById('video-player-close').addEventListener('click', closeVideoPlayer);
            videoPlayerOverlay.addEventListener('click', (e) => {
                if (e.target === videoPlayerOverlay) closeVideoPlayer();
            });
            document.getElementById('video-player-download').addEventListener('click', () => {
                if (videoPlayerState.id && videoPlayerState.name) {
                    downloadFile(videoPlayerState.id, videoPlayerState.name);
                }
            });

            // #193: テキストプレビュー
            let textPreviewState = { id: null, name: null };
            const textPreviewOverlay = document.getElementById('text-preview-overlay');
            const textPreviewBody = document.getElementById('text-preview-body');
            const textPreviewInfo = document.getElementById('text-preview-info');
            const textPreviewTitle = document.getElementById('text-preview-title');
            const textPreviewMode = document.getElementById('text-preview-mode');
            const textPreviewLines = document.getElementById('text-preview-lines');

            const loadTextPreview = async () => {
                if (!textPreviewState.id) return;
                textPreviewBody.textContent = '読み込み中...';
                textPreviewInfo.textContent = '';
                try {
                    const mode = textPreviewMode.value;
                    const lines = parseInt(textPreviewLines.value, 10) || 200;
                    const url = `/api/text-preview/${textPreviewState.id}?mode=${mode}&lines=${lines}`;
                    const res = await safeFetch(url);
                    if (!res.ok) {
                        // #216: サーバが 415 で「binary」と返したら専用メッセージに差し替え
                        if (res.status === 415) {
                            textPreviewBody.textContent =
                                'テキストファイルではないため表示できません（バイナリと判定）。';
                            return;
                        }
                        const msg = await res.text();
                        textPreviewBody.textContent = `表示できませんでした: ${msg}`;
                        return;
                    }
                    const data = await res.json();
                    textPreviewBody.textContent = data.content;
                    const truncatedNote = data.truncated ? `（${mode === 'head' ? '先頭' : '末尾'} ${data.lines} 行のみ）` : '';
                    textPreviewInfo.textContent = `全 ${data.totalLines} 行 ${truncatedNote}`;
                } catch (e) {
                    textPreviewBody.textContent = `エラー: ${e.message}`;
                }
            };

            window.openTextPreview = (id, name) => {
                textPreviewState = { id, name };
                textPreviewTitle.textContent = name;
                textPreviewMode.value = 'head';
                textPreviewLines.value = 200;
                textPreviewOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
                loadTextPreview();
            };

            const closeTextPreview = () => {
                textPreviewOverlay.classList.remove('open');
                document.body.style.overflow = '';
                textPreviewBody.textContent = '';
            };

            document.getElementById('text-preview-close').addEventListener('click', closeTextPreview);
            textPreviewOverlay.addEventListener('click', (e) => {
                if (e.target === textPreviewOverlay) closeTextPreview();
            });
            document.getElementById('text-preview-reload').addEventListener('click', loadTextPreview);
            textPreviewMode.addEventListener('change', loadTextPreview);
            document.getElementById('text-preview-download').addEventListener('click', () => {
                if (textPreviewState.id && textPreviewState.name) {
                    downloadFile(textPreviewState.id, textPreviewState.name);
                }
            });

            document.getElementById('lightbox-prev').addEventListener('click', () => {
                lightboxIndex = (lightboxIndex - 1 + lightboxImageList.length) % lightboxImageList.length;
                lightboxScale = 1;
                lightboxImg.style.transform = 'scale(1)';
                updateLightbox();
            });

            document.getElementById('lightbox-next').addEventListener('click', () => {
                lightboxIndex = (lightboxIndex + 1) % lightboxImageList.length;
                lightboxScale = 1;
                lightboxImg.style.transform = 'scale(1)';
                updateLightbox();
            });

            document.getElementById('lightbox-img-wrap').addEventListener('wheel', (e) => {
                e.preventDefault();
                lightboxScale = Math.min(Math.max(lightboxScale * (e.deltaY > 0 ? 0.9 : 1.1), 0.5), 5);
                lightboxImg.style.transform = `scale(${lightboxScale})`;
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (lightboxEl.classList.contains('open')) {
                    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
                    else if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
                    else if (e.key === 'Escape') closeLightbox();
                } else if (textPreviewOverlay.classList.contains('open')) {
                    if (e.key === 'Escape') closeTextPreview();
                } else if (videoPlayerOverlay.classList.contains('open')) {
                    if (e.key === 'Escape') closeVideoPlayer();
                }
            });

            // === ソートボタン ===
            const updateSortButtons = () => {
                document.getElementById('sortNameBtn').classList.toggle('active', sortBy === 'name');
                document.getElementById('sortSizeBtn').classList.toggle('active', sortBy === 'size');
                document.getElementById('sortOrderBtn').textContent = sortOrder === 'asc' ? '↑' : '↓';
            };

            document.getElementById('sortNameBtn').addEventListener('click', () => {
                sortBy = 'name'; updateSortButtons(); renderView();
            });
            document.getElementById('sortSizeBtn').addEventListener('click', () => {
                sortBy = 'size'; updateSortButtons(); renderView();
            });
            document.getElementById('sortOrderBtn').addEventListener('click', () => {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc'; updateSortButtons(); renderView();
            });
            document.getElementById('viewerModeBtn').addEventListener('click', () => {
                isViewerMode = !isViewerMode;
                const btn = document.getElementById('viewerModeBtn');
                btn.classList.toggle('active', isViewerMode);
                btn.textContent = isViewerMode ? '☰ リスト' : '🖼 グリッド';
                renderView();
            });
            document.getElementById('refreshBtn').addEventListener('click', () => {
                fetchFiles();
            });

            // 初期化処理：サーバー情報を取得し、認証モードに応じてPINモーダルを表示
            const init = async () => {
                try {
                    // サーバ起動タイムスタンプを取得してヘルスチェック開始
                    await checkServerHealth();
                    setInterval(checkServerHealth, 3000);

                    // /api/info は認証不要なのでfetchで直接取得
                    const infoResponse = await fetch('/api/info');
                    if (infoResponse.ok) {
                        serverInfo = await infoResponse.json();
                    }

                    // PINなしモードの場合はPINモーダルをスキップ
                    if (serverInfo.requiresAuth === false) {
                        showMainContent();
                        return;
                    }

                    // 既存セッションが有効か確認
                    const testResponse = await fetch('/api/files');
                    if (testResponse.ok) {
                        showMainContent();
                    } else {
                        showPinModal();
                    }
                } catch (error) {
                    showPinModal();
                }
            };

            init();
        });
    </script>
</body>
</html>
